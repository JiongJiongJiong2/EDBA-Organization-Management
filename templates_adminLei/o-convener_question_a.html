<div style="width: 100%; height: 100%; padding: 20px;">
    <h2 style="margin-bottom: 20px; color: #333; font-size: 24px;">Submit Question</h2>
    <div style="margin-bottom: 20px;">
        <form method="POST" style="display: flex; flex-direction: column; gap: 15px;" onsubmit="submitQuestion(event)">
            <div style="display: flex; gap: 10px; align-items: center;">
                <label style="min-width: 100px;">User ID:</label>
                <input type="text" name="sender_id" required style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label>Question Description:</label>
                <textarea name="description" required style="width: 100%; height: 150px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; resize: vertical;"></textarea>
            </div>
            <div style="display: flex; justify-content: flex-end;">
                <button type="submit" style="padding: 10px 20px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer;">Submit Question</button>
            </div>
        </form>
    </div>
</div>
