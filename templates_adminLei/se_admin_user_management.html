<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SE-Admin</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        .header {
            background: linear-gradient(to right, #1e5799, #2989d8);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        .user-info {
            font-size: 14px;
        }
        .container {
            display: flex;
            min-height: calc(100vh - 60px);
        }
        .sidebar {
            width: 250px;
            background-color: #f5f5f5;
            border-right: 1px solid #ddd;
            padding: 20px 0;
        }
        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .sidebar-menu li {
            padding: 10px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        .sidebar-menu li:hover {
            background-color: #e9e9e9;
        }
        .sidebar-menu li.active {
            background-color: #1e5799;
            color: white;
        }
        .content {
            flex: 1;
            padding: 20px;
        }
        .search-bar {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        .search-bar input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px 0 0 4px;
            width: 200px;
        }
        .search-bar button {
            padding: 8px 15px;
            background-color: #1e5799;
            color: white;
            border: none;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
        }
        .action-buttons {
            margin-bottom: 20px;
        }
        .action-button {
            padding: 5px 10px;
            margin-right: 10px;
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
        }
        .action-button.add {
            background-color: #5cb85c;
            color: white;
            border: none;
        }
        .action-button.edit {
            background-color: #f0ad4e;
            color: white;
            border: none;
        }
        .action-button.delete {
            background-color: #d9534f;
            color: white;
            border: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f5f5f5;
        }
        tr:hover {
            background-color: #f9f9f9;
        }
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }
        .actions {
            white-space: nowrap;
        }

        .checkbox-cell {
            width: 30px;
            text-align: center;
        }
        .id-cell {
            width: 50px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>SE-Admin</h1>
    </div>
    
    <div class="container">
        <div class="sidebar">
            <ul class="sidebar-menu">
                <li>
                    <div onclick="toggleMainMenu(); loadContent('/se_admin/main')" style="cursor: pointer;">
                    <span style="font-size: 12px; margin-left: 5px;">▼</span> Main
                    </div>
                    <ul id="main-submenu" style="list-style: none; padding-left: 15px; display: none;">
                        <li>
                            <div onclick="toggleSubMenu('user')" style="cursor: pointer;">
                            <span style="font-size: 12px; margin-left: 5px;" >▼</span> Manage User
                            </div>
                            <ul id="user-submenu" style="list-style: none; padding-left: 15px; display: none;">
                                <li onclick="loadContent('/se_admin/users/c')">SE-Admin</li>
                            </ul>
                        </li>
                        <li>
                            <div onclick="toggleSubMenu('product')" style="cursor: pointer;">
                            <span style="font-size: 12px; margin-left: 5px;">▼</span> Question List
                            </div>
                            <ul id="product-submenu" style="list-style: none; padding-left: 15px; display: none;">
                                <li onclick="loadContent('/se_admin/questions/a')">Answered</li>
                                <li onclick="loadContent('/se_admin/questions/b')">Not Answered</li>
                            </ul>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>

        <div class="content" id="main-content">
            <!-- Dynamic content will be loaded here -->
        </div>

    </div>

<script>
    function toggleMainMenu() {
        const mainSubmenu = document.getElementById('main-submenu');
        mainSubmenu.style.display = mainSubmenu.style.display === 'none' ? 'block' : 'none';
        // Save main menu state
        sessionStorage.setItem('mainMenuOpen', mainSubmenu.style.display === 'block');
    }

    function toggleSubMenu(menuType) {
        const submenu = document.getElementById(menuType + '-submenu');
        submenu.style.display = submenu.style.display === 'none' ? 'block' : 'none';
        // Save submenu state
        sessionStorage.setItem(menuType + 'SubmenuOpen', submenu.style.display === 'block');
    }

    function loadContent(url) {
        fetch(url)
            .then(response => response.text())
            .then(data => {
                document.getElementById('main-content').innerHTML = data;
                // Save current URL to sessionStorage
                sessionStorage.setItem('lastLoadedUrl', url);
            })
            .catch(error => {
                console.error('Error loading content:', error);
            });
    }

    // Restore all states when page loads
    document.addEventListener('DOMContentLoaded', function() {
        // Restore main menu state
        const mainMenuOpen = sessionStorage.getItem('mainMenuOpen') === 'true';
        const mainSubmenu = document.getElementById('main-submenu');
        if (mainMenuOpen) {
            mainSubmenu.style.display = 'block';
        }

        // Restore user submenu state
        const userSubmenuOpen = sessionStorage.getItem('userSubmenuOpen') === 'true';
        const userSubmenu = document.getElementById('user-submenu');
        if (userSubmenuOpen) {
            userSubmenu.style.display = 'block';
        }

        // Restore question submenu state
        const productSubmenuOpen = sessionStorage.getItem('productSubmenuOpen') === 'true';
        const productSubmenu = document.getElementById('product-submenu');
        if (productSubmenuOpen) {
            productSubmenu.style.display = 'block';
        }

        // Load content
        const lastUrl = sessionStorage.getItem('lastLoadedUrl');
        if (lastUrl) {
            loadContent(lastUrl);
        } else {
            loadContent('/se_admin/main');
        }
    });
</script>
</body>
</html>
