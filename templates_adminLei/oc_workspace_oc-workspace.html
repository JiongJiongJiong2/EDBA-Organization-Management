<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O-Convener_Workshop</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        .header {
            background: linear-gradient(to right, #1e5799, #2989d8);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        .container {
            display: flex;
            min-height: calc(100vh - 60px);
        }
        .sidebar {
            width: 250px;
            background-color: #f5f5f5;
            border-right: 1px solid #ddd;
            padding: 20px 0;
        }
        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .sidebar-menu li {
            padding: 10px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        .sidebar-menu li:hover {
            background-color: #e9e9e9;
        }
        .sidebar-menu li.active {
            background-color: #1e5799;
            color: white;
        }
        .content {
            flex: 1;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>O-Convener_Workshop</h1>
        <a href="http://localhost:5000" style="color: white; text-decoration: none; padding: 8px 16px; background-color: #4CAF50; border-radius: 4px;">Back to Main Page</a>
    </div>
    
    <div class="container">
        <div class="sidebar">
            <ul class="sidebar-menu">
                <li onclick="loadContent('/oc_workspace/account/a')">Bank Account</li>
                <li onclick="loadContent('/oc_workspace/list/a')">Member List</li>
                <li onclick="loadContent('/oc_workspace/information/a')">Organization Information</li>

                <li onclick="toggleSubMenu('service')" style="cursor: pointer;">
                    <span style="font-size: 12px; margin-left: 5px;">▼</span> Service
                </li>
                <ul id="service-submenu" style="list-style: none; padding-left: 20px; display: none;">
                    <li onclick="loadContent('/oc_workspace/service/a')">Course information sharing</li>
                    <li onclick="loadContent('/oc_workspace/service/a/settings')">Course setting</li>
                    <li onclick="loadContent('/oc_workspace/service/b')">Student identity authentication</li>
                    <li onclick="loadContent('/oc_workspace/service/c')">Thesis list</li>
                    <li onclick="loadContent('/oc_workspace/service/d')">Thesis sharing</li>
                </ul>
            </ul>
        </div>
        <div class="content" id="main-content">
            <!-- Dynamically loaded content will be displayed here -->
        </div>
    </div>

    <script>
        // Toggle submenu display
        function toggleSubMenu(menuType) {
            const submenu = document.getElementById(menuType + '-submenu');
            submenu.style.display = submenu.style.display === 'none' ? 'block' : 'none';
        }

        // Dynamically load page content
        function loadContent(url) {
            fetch(url)
                .then(response => response.text())
                .then(data => {
                    document.getElementById('main-content').innerHTML = data;
                })
                .catch(error => {
                    console.error('Error loading content:', error);
                });
        }
    </script>
</body>
</html>
