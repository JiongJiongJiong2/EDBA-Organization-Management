<h2>Bank Account Authentication</h2>
<form id="bank-form">
    <label>Bank:</label><br>
    <input type="text" name="bank"><br><br>

    <label>Account Name:</label><br>
    <input type="text" name="account_name"><br><br>

    <label>Account Number:</label><br>
    <input type="text" name="account_number"><br><br>

    <label>Password:</label><br>
    <input type="password" name="password"><br><br>

    <button type="submit">Submit</button>
</form>

<p id="result" style="font-weight: bold;"></p>

<script>
document.getElementById('bank-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const form = e.target;
    const data = {
        bank: form.bank.value,
        account_name: form.account_name.value,
        account_number: form.account_number.value,
        password: form.password.value
    };

    fetch('/oc_workspace/bank/authenticate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(response => {
        document.getElementById('result').innerText = response.status === "success"
            ? "✅ Authentication Passed"
            : "❌ Authentication Failed";
    })
    .catch(err => {
        document.getElementById('result').innerText = "Error: " + err;
    });
});
</script>
