<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thesis Inquiry</title>
</head>
<body>
    <h2>Thesis Search and Download</h2>
    <p>Welcome, {{ user.email }}!</p><br><br>

    <!-- 关键词搜索表单 -->
    <form action="{{ url_for('user.submit_thesis_inquiry', service_id=service.service_id) }}" method="post" style="margin-bottom: 20px;">
        <div>
            <label for="keywords">Keywords:</label>
            <input type="text" id="keywords" name="keywords" required>
            <button type="submit" name="search">Keyword Search</button>
        </div>
    </form>

    <!-- 下载表单 -->
    <form action="{{ url_for('user.submit_thesis_inquiry', service_id=service.service_id) }}" method="post" style="margin-bottom: 20px;">
        <div>
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" required>
            <button type="submit" name="download">Download</button>
        </div>
    </form>

    <!-- 显示结果 -->
    {% if result %}
        <h3>Search Results:</h3>
        <div style="margin: 20px 0;">
            {% if result is mapping %}
                {% for key, value in result.items() %}
                    <p><strong>{{ key }}:</strong> {{ value }}</p>
                {% endfor %}
            {% else %}
                <p>{{ result }}</p>
            {% endif %}
        </div>
    {% endif %}
    
    <br>
    <a href="{{ url_for('user.dashboard', user_type=session.get('user_type')) }}">Back to Dashboard</a>
</body>
</html>
