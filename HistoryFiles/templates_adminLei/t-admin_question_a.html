<!DOCTYPE html>
<html>
<head>
    <title>Answered Questions List</title>
    <style>
        .search-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-input {
            flex: 1;
            padding: 8px;
        }
        .search-button {
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
        .table-container {
            height: calc(100% - 60px);
            overflow-y: auto;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            background-color: #f2f2f2;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        .answer-form {
            display: flex;
            gap: 10px;
        }
        .answer-input {
            flex: 1;
            padding: 8px;
        }
        .confirm-button {
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div style="width: 100%; height: 100%; padding: 20px;">
        <h2 style="margin-bottom: 20px; color: #333; font-size: 24px;">Answered Questions List</h2>
        <div class="search-form">
            <form method="GET">
                <input type="text" name="search" placeholder="Search questions..." value="{{ search_query }}" class="search-input">
                <button type="submit" class="search-button">Search</button>
            </form>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Question ID</th>
                        <th>Question Description</th>
                        <th>Sender ID</th>
                        <th>Sender Email</th>
                        <th>Answer</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for question in questions %}
                    <tr>
                        <td>{{ question['question_id'] }}</td>
                        <td>{{ question['description'] }}</td>
                        <td>{{ question['sender_id'] }}</td>
                        <td>{{ question['sender'] }}</td>
                        <td>
                            <form method="POST" action="/t_admin/update_answer/{{ question['question_id'] }}" class="answer-form">
                                <input type="text" name="answer" value="{{ question['answer'] }}" class="answer-input">
                                <button type="submit" class="confirm-button">Confirm Edit</button>
                            </form>
                        </td>
                        <td>
                            <button onclick="document.querySelector('form[action=\'/update_answer/{{ question['question_id'] }}\']').submit()" class="confirm-button">Save Changes</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
