<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>EDBA System Login</title>
    <style>
        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            position: relative;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            width: 80%;
            max-width: 600px;
        }
        .policy-content {
            margin: 15px 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .close-btn {
            padding: 8px 20px;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            float: right;
        }
        .view-policy-btn {
            background: none;
            border: none;
            color: #007bff;
            text-decoration: underline;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h2>Login</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul>
        {% for category, msg in messages %}
          <li class="{{ category }}">{{ msg }}</li>
        {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}
    <form method="post" action="{{ url_for('auth.login') }}">
        <label for="email">email:</label>
        <input type="email" id="email" name="email" value="{{ request.form.email or session.get('email_pending', '') }}" required>
        <button type="submit" name="get_code">get verification code</button><br><br>

        <label for="code">verification code:</label>
        <input type="text" id="code" name="code">
        <button type="submit" name="login">Login</button>
    </form>
    <p><a href="{{ url_for('auth.register_oconvener') }}">Register (organization only)</a></p> {# Add link to registration page #}
    <button type="button" class="view-policy-btn" onclick="showPolicyModal()">View Policy</button>

    <!-- Policy Modal -->
    <div id="policyModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">Data Sharing Policy</h3>
            <div id="policyContent" class="policy-content">
                <!-- Policy content will be loaded here -->
            </div>
            <button class="close-btn" onclick="hidePolicyModal()">Close</button>
        </div>
    </div>

    <script>
        function showPolicyModal() {
            fetch("{{ url_for('auth.get_latest_policy') }}")
                .then(response => response.json())
                .then(data => {
                    document.getElementById('policyContent').innerHTML = `
                        <h4>${data.title}</h4>
                        <p>${data.content}</p>
                        ${data.pdf_path ? `<p><a href="${data.pdf_path}" target="_blank">Download PDF</a></p>` : ''}
                    `;
                    document.getElementById('policyModal').style.display = 'block';
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('policyContent').innerHTML = 'Failed to load policy content.';
                    document.getElementById('policyModal').style.display = 'block';
                });
        }

        function hidePolicyModal() {
            document.getElementById('policyModal').style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('policyModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
