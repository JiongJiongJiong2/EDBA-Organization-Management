<div style="width: 100%; height: 100%; padding: 20px;">
    <h2 style="margin-bottom: 20px; color: #333; font-size: 24px;">Answered Questions List</h2>
    <div style="margin-bottom: 20px;">
        <form method="GET" style="display: flex; gap: 10px;" onsubmit="searchQuestions(event)">
            <input type="hidden" name="user_id" value="{{ current_user_id }}">
            <input type="text" name="search" placeholder="Search questions..." value="{{ search_query }}" style="flex: 1; padding: 8px;">
            <button type="submit" style="padding: 8px 16px; background-color: #4CAF50; color: white; border: none; border-radius: 4px;">Search</button>
        </form>
    </div>
    <div style="height: calc(100% - 60px); overflow-y: auto; border: 1px solid #ccc; border-radius: 4px;">
        <table style="width: 100%; border-collapse: collapse;">
            <thead style="position: sticky; top: 0; background-color: #f2f2f2;">
                <tr>
                    <th style="padding: 12px; text-align: left; border-bottom: 1px solid #ddd;">Question ID</th>
                    <th style="padding: 12px; text-align: left; border-bottom: 1px solid #ddd;">Description</th>
                    <th style="padding: 12px; text-align: left; border-bottom: 1px solid #ddd;">Sender ID</th>
                    <th style="padding: 12px; text-align: left; border-bottom: 1px solid #ddd;">Sender Email</th>
                    <th style="padding: 12px; text-align: left; border-bottom: 1px solid #ddd;">Answer</th>
                </tr>
            </thead>
            <tbody>
                {% for question in questions %}
                <tr style="border-bottom: 1px solid #ddd;">
                    <td style="padding: 12px;">{{ question['question_id'] }}</td>
                    <td style="padding: 12px;">{{ question['description'] }}</td>
                    <td style="padding: 12px;">{{ question['sender_id'] }}</td>
                    <td style="padding: 12px;">{{ question['sender'] }}</td>
                    <td style="padding: 12px;">{{ question['answer'] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
