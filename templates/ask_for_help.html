<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Ask For Help</title>
    <style>
        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            display: none;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <h2>Submit Your Question</h2>
    <div id="messageBox" class="message"></div>
    <form id="questionForm" method="post" action="{{ url_for('submit_question') }}">
        <label for="description">Question Description:</label><br>
        <textarea id="description" name="description" rows="4" cols="50" required></textarea><br><br>
        <button type="submit">Submit</button>
    </form>

    <script>
        document.getElementById('questionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const messageBox = document.getElementById('messageBox');

            fetch(this.action, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                messageBox.textContent = data.message;
                messageBox.className = `message ${data.status === 'success' ? 'success' : 'error'}`;
                messageBox.style.display = 'block';

                if (data.status === 'success') {
                    setTimeout(() => {
                        window.location.href = data.redirect_url;
                    }, 2000); // 2秒后跳转
                }
            })
            .catch(error => {
                messageBox.textContent = 'An error occurred while submitting the question';
                messageBox.className = 'message error';
                messageBox.style.display = 'block';
            });
        });
    </script>
    
    <br>
    <a href="{{ url_for('dashboard', user_type=session.get('user_type')) }}">Back to Dashboard</a>
</body>
</html>
