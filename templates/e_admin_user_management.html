<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Admin</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        .header {
            background: linear-gradient(to right, #1e5799, #2989d8);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        .user-info {
            font-size: 14px;
        }
        .container {
            display: flex;
            min-height: calc(100vh - 60px);
        }
        .sidebar {
            width: 250px;
            background-color: #f5f5f5;
            border-right: 1px solid #ddd;
            padding: 20px 0;
        }
        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .sidebar-menu li {
            padding: 10px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        .sidebar-menu li:hover {
            background-color: #e9e9e9;
        }
        .sidebar-menu li.active {
            background-color: #1e5799;
            color: white;
        }
        .content {
            flex: 1;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>E-Admin</h1>
    </div>

    <div class="container">
        <div class="sidebar">
            <ul class="sidebar-menu">
                <li>
                    <div onclick="toggleMainMenu(); loadContent('{{ url_for('admin.e_admin_main_page') }}')" style="cursor: pointer;">
                    <span style="font-size: 12px; margin-left: 5px;">▼</span> Main
                    </div>
                    <ul id="main-submenu" style="list-style: none; padding-left: 15px; display: none;">
                        <!-- O-Convener Applications -->
                        <li onclick="loadContent('{{ url_for('admin.e_admin_applications') }}')">O-Convener Applications</li>
                        
                        <!-- System Management -->
                        <li>
                            <div onclick="toggleSubMenu('system')" style="cursor: pointer;">
                            <span style="font-size: 12px; margin-left: 5px;">▼</span> System
                            </div>
                            <ul id="system-submenu" style="list-style: none; padding-left: 15px; display: none;">
                                <li onclick="loadContent('{{ url_for('admin.e_admin_policies') }}')">Data Sharing Policies</li>
                                <li onclick="loadContent('{{ url_for('admin.e_admin_logs') }}')">System Logs</li>
                                <li onclick="loadContent('{{ url_for('admin.e_admin_bank_settings') }}')">Bank Settings</li>
                            </ul>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>

        <div class="content" id="main-content">
            <!-- Dynamic content will be loaded here -->
        </div>
    </div>

<script>
    function toggleMainMenu() {
        const mainSubmenu = document.getElementById('main-submenu');
        mainSubmenu.style.display = mainSubmenu.style.display === 'none' ? 'block' : 'none';
        sessionStorage.setItem('mainMenuOpen', mainSubmenu.style.display === 'block');
    }

    function toggleSubMenu(menuType) {
        const submenu = document.getElementById(menuType + '-submenu');
        submenu.style.display = submenu.style.display === 'none' ? 'block' : 'none';
        sessionStorage.setItem(menuType + 'SubmenuOpen', submenu.style.display === 'block');
    }

    function loadContent(url) {
        fetch(url)
            .then(response => response.text())
            .then(data => {
                document.getElementById('main-content').innerHTML = data;
                sessionStorage.setItem('lastLoadedUrl', url);
            })
            .catch(error => {
                console.error('Error loading content:', error);
            });
    }

    document.addEventListener('DOMContentLoaded', function() {
        const mainMenuOpen = sessionStorage.getItem('mainMenuOpen') === 'true';
        const mainSubmenu = document.getElementById('main-submenu');
        if (mainMenuOpen) {
            mainSubmenu.style.display = 'block';
        }

        const submenuOpen = sessionStorage.getItem('system' + 'SubmenuOpen') === 'true';
        const submenu = document.getElementById('system-submenu');
        if (submenuOpen && submenu) {
            submenu.style.display = 'block';
        }

        const content = `
            <div style="width: 100%; height: 100%; padding: 20px;">
                <h2 style="margin-bottom: 30px; color: #333; font-size: 24px;">Welcome to E-Admin Management System</h2>
                <p style="color: #666; margin-bottom: 20px;">Please use the sidebar menu to navigate through different functions.</p>
            </div>`;
        document.getElementById('main-content').innerHTML = content;
    });
</script>
</body>
</html>
