<!DOCTYPE html>
<html>
<head>
    <title>T-Admin Unanswered Questions</title>
    <style>
        .container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .search-form {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        .search-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: white;
        }
        .btn-primary {
            background-color: #4CAF50;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
            position: sticky;
            top: 0;
        }
        .time-info {
            font-size: 0.9em;
            color: #666;
        }
        .answer-form {
            display: flex;
            gap: 10px;
        }
        .answer-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Unanswered Questions</h1>
        
        <div class="search-form">
            <form method="GET">
                <input type="text" name="search" value="{{ search_query }}" placeholder="Search questions..." class="search-input">
                <button type="submit" class="btn btn-primary">Search</button>
            </form>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Description</th>
                    <th>User</th>
                    <th>Role</th>
                    <th>Submit Time</th>
                    <th>Answer</th>
                </tr>
            </thead>
            <tbody>
                {% for question in questions %}
                <tr>
                    <td>{{ question.title }}</td>
                    <td>{{ question.description }}</td>
                    <td>{{ question.sender.email }}</td>
                    <td>{{ question.sender.user_type }}</td>
                    <td class="time-info">{{ question.submit_time.strftime('%Y-%m-%d %H:%M:%S') }}</td>
                    <td>
                        <form action="{{ url_for('admin.t_admin_submit_answer', question_id=question.question_id) }}" method="POST" class="answer-form">
                            <input type="text" name="answer" class="answer-input" required placeholder="Type your answer here...">
                            <button type="submit" class="btn btn-primary">Submit Answer</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
