<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Organization List</title>
</head>
<body>
    <h2>Organizations list</h2>
    <p>Welcome, {{ user.email }}!</p><br><br>
    {% if organizations %}
        {% for org in organizations %}
            <div style="margin: 10px 0;">
                {{ org.name }}
                <form action="{{ url_for('organization_list_student', service_type=request.view_args.service_type) }}" method="post" style="display: inline;">
                    <input type="hidden" name="organization_id" value="{{ org.organization_id }}">
                    <input type="hidden" name="user_id" value="{{ user_id }}">
                    <button type="submit" name="access">Access</button>
                </form>
            </div>
        {% endfor %}
    {% else %}
        <p>No organizations found providing this service.</p>
    {% endif %}
    
    <br>
    <a href="{{ url_for('dashboard', user_type=session.get('user_type')) }}">Back to Dashboard</a>
</body>
</html>
