<!DOCTYPE html>
<html>
<head>
    <title>O-Convener List</title>
    <script>
        function handleSearch(event) {
            event.preventDefault();
            const searchQuery = document.querySelector('input[name="search"]').value;
            const url = new URL(window.location.href);
            url.searchParams.set('search', searchQuery);
            
            fetch(url.toString())
                .then(response => response.text())
                .then(html => {
                    document.body.innerHTML = html;
                })
                .catch(error => {
                    console.error('Error searching:', error);
                });
        }

        function goBack() {
            fetch("{{ url_for('admin.t_admin_main_page') }}")
                .then(response => response.text())
                .then(html => {
                    document.body.innerHTML = html;
                })
                .catch(error => {
                    console.error('Error returning to main page:', error);
                });
        }
    </script>
    <style>
        .search-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-input {
            flex: 1;
            padding: 8px;
        }
        .search-button {
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
        .table-container {
            height: calc(100% - 60px);
            overflow-y: auto;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            background-color: #f2f2f2;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <div style="width: 100%; height: 100%; padding: 20px;">
        <h2 style="margin-bottom: 20px; color: #333; font-size: 24px;">O-Convener List</h2>
        <div class="search-form">
            <form onsubmit="handleSearch(event)">
                <input type="text" name="search" placeholder="Search user..." value="{{ search_query }}" class="search-input">
                <button type="submit" class="search-button">Search</button>
                <button type="button" onclick="goBack()" style="margin-left: 10px; background-color: #666;">Back</button>
            </form>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Email</th>
                        <th>User Type</th>
                        <th>Organization ID</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>{{ user['user_id'] }}</td>
                        <td>{{ user['email'] }}</td>
                        <td>{{ user['user_type'] }}</td>
                        <td>{{ user['organization_id'] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
