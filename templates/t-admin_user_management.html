<!DOCTYPE html>
<html>
<head>
    <title>T-Admin User Management</title>
    <style>
        .container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: white;
        }
        .btn-primary {
            background-color: #4CAF50;
        }
        .admin-list {
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
        }
        .search-form {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        .search-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>T-Admin User Management</h1>
        
        <!-- Create New Admin Section -->
        <div class="section">
            <h2>Create New Admin</h2>
            <form action="{{ url_for('admin.t_admin_setup_admin') }}" method="POST">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="admin_type">Admin Type:</label>
                    <select id="admin_type" name="admin_type" required>
                        <option value="EE">E-Admin</option>
                        <option value="SE">Senior E-Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Create Admin</button>
            </form>
        </div>

        <!-- Existing Admins Section -->
        <div class="section">
            <h2>Existing Admins</h2>
            <div class="search-form">
                <form method="GET">
                    <input type="text" name="search" value="{{ search_query }}" placeholder="Search admins..." class="search-input">
                    <button type="submit" class="btn btn-primary">Search</button>
                </form>
            </div>
            <div class="admin-list">
                <table>
                    <thead>
                        <tr>
                            <th>Email</th>
                            <th>Type</th>
                            <th>Organization</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for admin in admins %}
                        <tr>
                            <td>{{ admin.email }}</td>
                            <td>{{ admin.user_type }}</td>
                            <td>{{ admin.organization.name }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
