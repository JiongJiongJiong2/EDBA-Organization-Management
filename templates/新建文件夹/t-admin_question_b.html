<!DOCTYPE html>
<html>
<head>
    <title>Unanswered Questions List</title>
    <script>
        function handleSearch(event) {
            event.preventDefault();
            const searchQuery = document.querySelector('input[name="search"]').value;
            const url = new URL(window.location.href);
            url.searchParams.set('search', searchQuery);
            
            fetch(url.toString())
                .then(response => response.text())
                .then(html => {
                    document.body.innerHTML = html;
                })
                .catch(error => {
                    console.error('Error searching:', error);
                });
        }

        function goBack() {
            fetch("{{ url_for('admin.t_admin_main_page') }}")
                .then(response => response.text())
                .then(html => {
                    document.body.innerHTML = html;
                })
                .catch(error => {
                    console.error('Error returning to main page:', error);
                });
        }

        function handleAnswerSubmit(event, questionId) {
            event.preventDefault();
            const form = document.getElementById('answer_form_' + questionId);
            const answer = form.querySelector('input[name="answer"]').value;
            const url = "{{ url_for('admin.t_admin_submit_answer', question_id='') }}" + questionId;
            
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'answer=' + encodeURIComponent(answer)
            })
                .then(response => response.text())
                .then(html => {
                    document.body.innerHTML = html;
                })
                .catch(error => {
                    console.error('Error submitting answer:', error);
                });
        }

        function handleCancel(formId) {
            document.getElementById(formId).reset();
        }

        document.addEventListener('DOMContentLoaded', function() {
            // Add event listener for search form
            document.querySelector('.search-form form').addEventListener('submit', handleSearch);

            // Add event listener for back button
            document.querySelector('.back-button').addEventListener('click', goBack);

            // Add event listeners for answer forms
            document.querySelectorAll('.answer-form').forEach(form => {
                const questionId = form.id.replace('answer_form_', '');
                form.addEventListener('submit', (e) => handleAnswerSubmit(e, questionId));
            });

            // Add event listeners for cancel buttons
            document.querySelectorAll('.cancel-button').forEach(button => {
                button.addEventListener('click', function() {
                    handleCancel(this.dataset.formId);
                });
            });

            // Add event listeners for submit buttons
            document.querySelectorAll('.submit-answer').forEach(button => {
                const formId = button.dataset.formId;
                button.addEventListener('click', () => {
                    document.getElementById(formId).dispatchEvent(new Event('submit'));
                });
            });
        });
    </script>
    <style>
        .search-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-input {
            flex: 1;
            padding: 8px;
        }
        .search-button {
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
        .table-container {
            height: calc(100% - 60px);
            overflow-y: auto;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            background-color: #f2f2f2;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        .answer-form {
            display: flex;
            gap: 10px;
        }
        .answer-input {
            flex: 1;
            padding: 8px;
        }
        .confirm-button {
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
        .cancel-button {
            padding: 8px 16px;
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div style="width: 100%; height: 100%; padding: 20px;">
        <h2 style="margin-bottom: 20px; color: #333; font-size: 24px;">Unanswered Questions List</h2>
        <div class="search-form">
            <form>
                <input type="text" name="search" placeholder="Search questions..." value="{{ search_query }}" class="search-input">
                <button type="submit" class="search-button">Search</button>
                <button type="button" class="back-button" style="margin-left: 10px; background-color: #666; color: white; padding: 8px 16px; border: none; border-radius: 4px;">Back</button>
            </form>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Question ID</th>
                        <th>Question Description</th>
                        <th>Sender ID</th>
                        <th>Sender Email</th>
                        <th>Answer</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for question in questions %}
                    <tr>
                        <td>{{ question['question_id'] }}</td>
                        <td>{{ question['description'] }}</td>
                        <td>{{ question['sender_id'] }}</td>
                        <td>{{ question['sender'] }}</td>
                        <td>
                            <form id="answer_form_{{ question['question_id'] }}" 
                                  class="answer-form"
                                  data-question-id="{{ question['question_id'] }}">
                                <input type="text" name="answer" value="{{ question['answer'] }}" class="answer-input">
                                <button type="submit" class="confirm-button">Confirm</button>
                                <button type="button" class="cancel-button" data-form-id="answer_form_{{ question['question_id'] }}">Cancel</button>
                            </form>
                        </td>
                        <td>
                            <button type="button" 
                                    class="confirm-button submit-answer"
                                    data-form-id="answer_form_{{ question['question_id'] }}">
                                Submit Answer
                            </button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
