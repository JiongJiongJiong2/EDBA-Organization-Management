<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Provide Course Information</title>
    <style>
        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <h2>Provide Course Information</h2>

    <form method="post">
        <div style="margin: 10px 0;">
            <label for="course_name">Course Name:</label><br>
            <input type="text" id="course_name" name="course_name" required>
        </div>
        
        <div style="margin: 10px 0;">
            <label for="course_description">Course Description:</label><br>
            <textarea id="course_description" name="course_description" rows="4" cols="50"></textarea>
        </div>
        
        <div style="margin: 10px 0;">
            <button type="submit">Submit</button>
        </div>
    </form>
    
    <br>
    <a href="{{ url_for('user.dashboard', user_type=session.get('user_type')) }}">Back to Dashboard</a>
</body>
</html>
